services:
  api:
    build: .
    ports:
      - '4000:4000'
    env_file:
      - .env
    environment:
      PORT: 4000
      DASHBOARD_URL: http://localhost:4001
      # Ollama on host machine (Linux: use host network or set OLLAMA_BASE_URL)
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./screenshots:/app/screenshots
      - ./.tmp:/app/.tmp
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - '4001:4001'
    depends_on:
      - api
    restart: unless-stopped
